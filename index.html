<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Amazing Race</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>

    <script>
        const EMBEDDED_TASKS = `
1|The Fountain|100|WATER|Find the fountain and count the frogs.|Look near the stone base.|fountain.jpg
2|Statue Year|150|1892|What year is on the bronze plaque?|It is on the back side.|statue.jpg
3|Library Secret|200|BOOKWORM|Find the red book in the lobby.|Author name is Smith.|library.jpg
        `;
    </script>

    <div id="welcome-screen" class="screen active">
	<img src="images/icon.png" alt="Main image" width="96" height="96">
        <h1>🏁 AMAZING RACE</h1>
        <p>Enter team name to begin:</p>
        <input type="text" id="team-name-input" placeholder="Team Name...">
        <br><button onclick="startRace()">START RACE</button>
    </div>

    <div id="game-hub" class="screen">
        <h2 id="team-name-display">Team</h2>
        <div class="score-box">SCORE: <span id="score">0</span></div>
        <div id="task-list" class="task-list"></div>
        <button onclick="resetGame()" class="btn-reset">Reset Progress</button>
    </div>

    <div id="task-modal">
        <div class="modal-content">
            <h2 id="modal-title" onclick="handleAdminTap()">Task</h2>
            <img id="modal-image" src="" alt="Task Image">
            <p id="modal-clue"></p>
            
            <div id="input-section">
                <input type="text" id="passcode-input" placeholder="Enter Code">
                <button onclick="submitPasscode()" class="btn-main">SUBMIT</button>
                <button id="hint-button" onclick="revealHint()" class="btn-hint">Unlock Hint (-25 Pts)</button>
                <p id="hint-text" class="hint-display"></p>
            </div>

            <div id="lockout-section" style="display:none;">
                <p class="lockout-msg">LOCKED OUT!</p>
                <div class="timer" id="timer-display">02:00</div>
            </div>
            
            <button onclick="closeModal()" class="btn-close">Close</button>
        </div>
    </div>

    <div id="pit-stop-screen" class="screen">
        <h1>🏆 PIT STOP!</h1>
        <h2 id="final-team-name"></h2>
        <p id="final-time-display"></p>
        <h1 id="final-total-points"></h1>
        <button onclick="downloadResults()" class="btn-main">SAVE RESULTS</button>
        <button onclick="resetGame()" class="btn-reset">NEW GAME</button>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Amazing Race</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/icon.png">
    
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>
<body>

    <div id="global-timer-bar" style="position: fixed; top: 0; width: 100%; text-align: center; z-index: 9999; padding: 10px; pointer-events: none;">
        <span id="timer" style="font-family: monospace; font-size: 1.5rem; color: var(--gold); background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 0 0 10px 10px; border: 1px solid #444; border-top: none;">00:00</span>
    </div>

    <div id="welcome-screen" class="screen active">
        <img src="images/icon.png" alt="Main image" width="96" height="96">
        <h1 onclick="handleAdminTap()">🏆 AMAZING RACE</h1>
        <p>Enter your team name to begin.</p>
        <input type="text" id="team-name-input" placeholder="Team Name..." maxlength="20">
        <button onclick="startRace()" class="btn-main">START RACE</button>
    </div>

    <div id="hub-screen" class="screen">
        <h2 id="hub-team-display">MISSION HUB</h2>
        <h1 id="hub-score">Score: 0</h1>
        
        <div class="progress-container">
            <div id="progress-bar">0%</div>
        </div>

        <div id="task-list" class="task-grid"></div>

        <button id="finish-btn" onclick="showPitStop()" class="btn-main" style="display:none; margin-bottom: 20px;">🏁 PIT STOP</button>

        <button onclick="adminResetTrigger()" class="btn-reset-small">⚠️ ADMIN RESET</button>
    </div>

    <div id="task-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            
            <h2 id="modal-title"></h2>
            <p id="modal-desc"></p>
            
            <img id="modal-image" src="" onclick="zoomImage()" alt="Task Clue">

            <div id="photo-proof-section">
                <p>📸 Take a Team Photo at this location to unlock:</p>
                <input type="file" accept="image/*" capture="camera" id="task-photo-input" onchange="previewPhoto(event)" style="display:none;">
                <button onclick="document.getElementById('task-photo-input').click()" class="btn-secondary">OPEN CAMERA</button>
                <div id="photo-preview-container" style="display:none;">
                    <img id="task-photo-preview">
                </div>
            </div>

            <div id="input-section">
                <input type="text" id="passcode-input" placeholder="ENTER CODE" autocomplete="off">
                <button onclick="submitPasscode()" class="btn-main">SUBMIT</button>
                <button onclick="revealHint()" class="btn-hint">GET HINT (-25 pts)</button>
            </div>

            <div id="lockout-section" style="display:none;">
                <h3 style="color:#ff4444;">🚨 LOCKED</h3>
                <p>Too many attempts. Wait:</p>
                <div id="timer-display" class="timer">Lockdown activated</div>
            </div>
        </div>
    </div>

    <div id="pit-stop-screen" class="screen" style="display:none;">
        <h1 style="color: var(--gold); text-align: center; margin-top: 20px;">RACE COMPLETE</h1>
        
        <div class="final-stats-header" style="text-align: center; margin-bottom: 30px;">
            <h2 id="final-team-name" style="margin-bottom: 5px;"></h2>
            <div id="final-time-display" style="font-size: 1.2rem; color: #aaa;"></div>
            <div style="font-size: 2rem; font-weight: bold; color: var(--gold); margin-top: 10px;">
                TOTAL: <span id="final-total-points">0</span> PTS
            </div>
        </div>

        <div id="station-breakdown" class="results-list"></div>

        <div style="margin-top: 40px; padding-bottom: 50px; display: flex; flex-direction: column; gap: 15px;">
            <button onclick="downloadPDF()" class="btn-main" style="background: #b8860b; color: white;">
                🏁 DOWNLOAD PDF REPORT
            </button>

            <button onclick="downloadResults()" class="btn-report">
                📄 SAVE TEXT LOG (.TXT)
            </button>

            <button onclick="adminResetTrigger()" class="btn-reset" style="opacity: 0.3; margin-top: 20px;">
                ⚠️ ADMIN RESET
            </button>
        </div>

    </div>

    <div id="image-overlay" onclick="closeZoom()">
        <img id="overlay-img" src="">
        <p class="overlay-close-hint">Tap anywhere to close</p>
    </div>

    <div id="debug-status-bar" style="position: fixed; bottom: 0; left: 0; width: 100%; height: 25px; display: flex; z-index: 10001; font-family: sans-serif; font-size: 10px; font-weight: bold; text-transform: uppercase; color: white; pointer-events: none; opacity: 0.8;">
        <div id="db-indicator" style="flex: 1; display: flex; align-items: center; justify-content: center; background: #444;">PHOTOS</div>
        <div id="storage-indicator" style="flex: 1; display: flex; align-items: center; justify-content: center; background: #444; border-left: 1px solid rgba(255,255,255,0.1); border-right: 1px solid rgba(255,255,255,0.1);">DATA</div>
        <div id="offline-indicator" style="flex: 1; display: flex; align-items: center; justify-content: center; background: #444;">WIFI</div>
    </div>

    <script src="tasks.js"></script>
    <script src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js?v=15').then(() => console.log("SW Active"));
        }
    </script>
</body>
</html>
